name: Annual Data Refresh

on:
  schedule:
    - cron: '0 9 1 11 *'
  workflow_dispatch:

jobs:
  refresh-data:
    name: Fetch & rebuild with fresh data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch colleges (College Scorecard API)
        env:
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
        run: node scripts/fetch-colleges.js

      - name: Build production bundle
        run: npm run build

      - name: Commit updated colleges.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/colleges.json src/data/colleges.js
          git diff --staged --quiet || git commit -m "data: annual College Scorecard refresh $(date +%Y)"
          git push

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=dist
